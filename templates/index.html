<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Default Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; font-size: 28px; margin-bottom: 8px; color: #38bdf8; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
        .card { background: #1e293b; border-radius: 12px; padding: 32px; margin-bottom: 24px; }
        .section-title { font-size: 13px; font-weight: 600; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; color: #94a3b8; }
        input, select { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus, select:focus { border-color: #38bdf8; }
        select option { background: #1e293b; }
        .btn { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
        .btn:hover { background: #7dd3fc; }
        .result { display: none; text-align: center; padding: 24px; border-radius: 12px; margin-top: 24px; }
        .result.default { background: #450a0a; border: 1px solid #ef4444; }
        .result.no-default { background: #052e16; border: 1px solid #22c55e; }
        .result-label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
        .result-value { font-size: 36px; font-weight: 800; }
        .result.default .result-value { color: #ef4444; }
        .result.no-default .result-value { color: #22c55e; }
        .result-prob { font-size: 14px; color: #94a3b8; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Loan Default Predictor</h1>
        <p class="subtitle">Enter borrower details to predict default probability</p>

        <div class="card">
            <p class="section-title">Personal Information</p>
            <div class="grid">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="Age" placeholder="25">
                </div>
                <div class="form-group">
                    <label>Income (₹)</label>
                    <input type="number" id="Income" placeholder="35000">
                </div>
                <div class="form-group">
                    <label>Education</label>
                    <select id="Education">
                        <option value="0">High School</option>
                        <option value="1">Bachelor's</option>
                        <option value="2">Master's</option>
                        <option value="3">PhD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Marital Status</label>
                    <select id="MaritalStatus">
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                        <option value="Divorced">Divorced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Has Dependents</label>
                    <select id="HasDependents">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Has Co-Signer</label>
                    <select id="HasCoSigner">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <p class="section-title">Employment Information</p>
            <div class="grid">
                <div class="form-group">
                    <label>Employment Type</label>
                    <select id="EmploymentType">
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Self-employed">Self-employed</option>
                        <option value="Unemployed">Unemployed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Months Employed</label>
                    <input type="number" id="MonthsEmployed" placeholder="6">
                </div>
                <div class="form-group">
                    <label>Num Credit Lines</label>
                    <input type="number" id="NumCreditLines" placeholder="2">
                </div>
                <div class="form-group">
                    <label>Has Mortgage</label>
                    <select id="HasMortgage">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <p class="section-title">Loan Information</p>
            <div class="grid">
                <div class="form-group">
                    <label>Loan Amount (₹)</label>
                    <input type="number" id="LoanAmount" placeholder="15000">
                </div>
                <div class="form-group">
                    <label>Credit Score</label>
                    <input type="number" id="CreditScore" placeholder="550">
                </div>
                <div class="form-group">
                    <label>Interest Rate (%)</label>
                    <input type="number" step="0.1" id="InterestRate" placeholder="18.5">
                </div>
                <div class="form-group">
                    <label>Loan Term (months)</label>
                    <input type="number" id="LoanTerm" placeholder="36">
                </div>
                <div class="form-group">
                    <label>DTI Ratio</label>
                    <input type="number" step="0.01" id="DTIRatio" placeholder="0.6">
                </div>
                <div class="form-group">
                    <label>Loan Purpose</label>
                    <select id="LoanPurpose">
                        <option value="Auto">Auto</option>
                        <option value="Business">Business</option>
                        <option value="Education">Education</option>
                        <option value="Home">Home</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
        </div>

        <button class="btn" onclick="predict()">Predict Default Risk</button>

        <div class="result" id="result">
            <p class="result-label">Prediction</p>
            <p class="result-value" id="result-value"></p>
            <p class="result-prob" id="result-prob"></p>
        </div>
    </div>

    <script>
        async function predict() {
            const emp = document.getElementById('EmploymentType').value;
            const marital = document.getElementById('MaritalStatus').value;
            const purpose = document.getElementById('LoanPurpose').value;

            const data = {
                Age: +document.getElementById('Age').value,
                Income: +document.getElementById('Income').value,
                LoanAmount: +document.getElementById('LoanAmount').value,
                CreditScore: +document.getElementById('CreditScore').value,
                MonthsEmployed: +document.getElementById('MonthsEmployed').value,
                NumCreditLines: +document.getElementById('NumCreditLines').value,
                InterestRate: +document.getElementById('InterestRate').value,
                LoanTerm: +document.getElementById('LoanTerm').value,
                DTIRatio: +document.getElementById('DTIRatio').value,
                Education: +document.getElementById('Education').value,
                HasMortgage: +document.getElementById('HasMortgage').value,
                HasDependents: +document.getElementById('HasDependents').value,
                HasCoSigner: +document.getElementById('HasCoSigner').value,
                'EmploymentType_Full-time': emp === 'Full-time' ? 1 : 0,
                'EmploymentType_Part-time': emp === 'Part-time' ? 1 : 0,
                'EmploymentType_Self-employed': emp === 'Self-employed' ? 1 : 0,
                'EmploymentType_Unemployed': emp === 'Unemployed' ? 1 : 0,
                'MaritalStatus_Divorced': marital === 'Divorced' ? 1 : 0,
                'MaritalStatus_Married': marital === 'Married' ? 1 : 0,
                'MaritalStatus_Single': marital === 'Single' ? 1 : 0,
                'LoanPurpose_Auto': purpose === 'Auto' ? 1 : 0,
                'LoanPurpose_Business': purpose === 'Business' ? 1 : 0,
                'LoanPurpose_Education': purpose === 'Education' ? 1 : 0,
                'LoanPurpose_Home': purpose === 'Home' ? 1 : 0,
                'LoanPurpose_Other': purpose === 'Other' ? 1 : 0
            };

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const resultDiv = document.getElementById('result');
            const resultValue = document.getElementById('result-value');
            const resultProb = document.getElementById('result-prob');

            resultDiv.style.display = 'block';
            resultValue.textContent = result.prediction;
            resultProb.textContent = `Default Probability: ${result.default_probability}%`;

            resultDiv.className = 'result';
            resultDiv.classList.add(result.prediction === 'DEFAULT' ? 'default' : 'no-default');
        }
    </script>
</body>
</html>
